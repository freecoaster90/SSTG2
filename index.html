<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업설명 상세 대시보드</title>
    <style>
        /* 여백 제거 및 배경색 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* 배경을 어둡게 하면 이미지가 더 돋보입니다 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 이미지 컨테이너: 기기 너비에 맞춤 */
        .image-container {
            width: 100%;
            max-width: 1200px; /* 너무 퍼지지 않게 최대 너비 제한 (자유롭게 조절 가능) */
            line-height: 0;   /* 이미지 사이의 미세한 틈새 제거 */
        }

        /* 이미지 스타일: 비율 유지하며 연속 배치 */
        .business-slide {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            /* 부드러운 로딩 효과 */
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 상단 제목 (선택 사항, 필요 없으면 삭제 가능) */
        .top-header {
            width: 100%;
            text-align: center;
            padding: 40px 0;
            color: white;
            font-family: 'Pretendard', sans-serif;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>PROJECT DASHBOARD</h1>
        <p>사업 설명 상세 슬라이드</p>
    </div>

    <div class="image-container" id="mainDashboard">
        </div>

    <script>
        // 1. 여기에 파일명을 순서대로 모두 입력
        const slideFiles = [
            "슬라이드1.jpg", "슬라이드2.jpg", "슬라이드3.jpg", "슬라이드4.jpg",
            "슬라이드5.jpg", "슬라이드6.jpg", "슬라이드7.jpg", "슬라이드8.jpg",
            "슬라이드9.jpg", "슬라이드10.jpg", "슬라이드11.jpg", "슬라이드12.jpg",
            "슬라이드13.jpg", "슬라이드14.jpg", "슬라이드15.jpg", "슬라이드16.jpg",
            "슬라이드17.jpg", "슬라이드18.jpg", "슬라이드19.jpg", "슬라이드20.jpg",
            "슬라이드21.jpg", "슬라이드22.jpg", "슬라이드23.jpg", "슬라이드24.jpg"
        ];

        const dashboard = document.getElementById('mainDashboard');

        // 2. 파일 리스트를 읽어서 순차적으로 이미지 태그 생성
        slideFiles.forEach((file) => {
            const img = document.createElement('img');
            img.src = `./${file}`; // HTML과 같은 위치
            img.className = 'business-slide';
            img.alt = file;
            
            // 이미지 로드 실패 시 대체 처리 (파일 이름 오타 방지)
            img.onerror = function() {
                this.style.display = 'none'; 
                console.error(file + " 파일을 찾을 수 없습니다.");
            };

            dashboard.appendChild(img);
        });
    </script>

</body>
</html>
