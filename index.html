<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서산간척지 설명차트</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-container {
            width: 100%;
            max-width: 1200px;
            line-height: 0; 
        }

        .business-slide {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .top-header {
            width: 100%;
            text-align: center;
            padding: 40px 0;
            color: white;
            font-family: 'Pretendard', sans-serif;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>서산간척지 설명차트</h1>
        <p>서산태안Biz팀</p>
    </div>

    <div class="image-container" id="mainDashboard"></div>

    <script>
        const slideFiles = [
            "슬라이드1.JPG", "슬라이드2.JPG", "슬라이드3.JPG", "슬라이드4.JPG",
            "슬라이드5.JPG", "슬라이드6.JPG", "슬라이드7.JPG", "슬라이드8.JPG",
            "슬라이드9.JPG", "슬라이드10.JPG", "슬라이드11.JPG", "슬라이드12.JPG",
            "슬라이드13.JPG", "슬라이드14.JPG", "슬라이드15.JPG", "슬라이드16.JPG",
            "슬라이드17.JPG", "슬라이드18.JPG", "슬라이드19.JPG", "슬라이드20.JPG",
            "슬라이드21.JPG", "슬라이드22.JPG", "슬라이드23.JPG", "슬라이드24.JPG"
        ];

        const dashboard = document.getElementById('mainDashboard');

        slideFiles.forEach((file) => {
            const img = document.createElement('img');
            
            // 핵심 수정 부분: 경로 앞에 'jpeg/' 폴더명을 추가했습니다.
            img.src = `./jpeg/${file}`; 
            
            img.className = 'business-slide';
            img.alt = file;
            
            img.onerror = function() {
                this.style.display = 'none'; 
            };

            dashboard.appendChild(img);
        });
    </script>

</body>
</html>
